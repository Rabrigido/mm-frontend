<div class="mx-auto p-6">
  <a routerLink="/repos" class="text-sm text-blue-600 hover:underline">← Volver</a>

 

  <!-- Metrics Tabs Component -->

  <div class="my-3">
    <app-reports-navbar [(selected)]="selectedReport"> </app-reports-navbar>
  </div>
  <!-- 🔹 Contenedor del reporte seleccionado -->
  <div *ngIf="selectedReport() as rSel" class="my-6">
    <ng-container [ngSwitch]="rSel">
      <!-- <app-loc-sloc *ngSwitchCase="'loc-sloc'" [repoId]="repo()!.id">
      </app-loc-sloc>
 -->

      <app-hierarchical-graph *ngSwitchCase="'hierarchical-graph'" [repoId]="repo()!.id"
        (openDetailsModal)="showDetailsModal.set(true)">
      </app-hierarchical-graph>

      <app-module-class-graph *ngSwitchCase="'module-class-graph'" [repoId]="repo()!.id"
        (openDetailsModal)="showDetailsModal.set(true)">
      </app-module-class-graph>

      <app-module-function-graph *ngSwitchCase="'module-function-graph'" [repoId]="repo()!.id"
        (openDetailsModal)="showDetailsModal.set(true)">
      </app-module-function-graph>

      <!-- <app-files-metric *ngSwitchCase="'files'" [repoId]="repo()!.id">
      </app-files-metric>

      <app-functions-per-file *ngSwitchCase="'functions-per-file'" [repoId]="repo()!.id">
      </app-functions-per-file>

      <app-cyclomatic-metric *ngSwitchCase="'cyclomatic-complexity'" [repoId]="repo()!.id">
      </app-cyclomatic-metric>

      <app-dependencies-d3 *ngSwitchCase="'dependencies'" [repoId]="repo()!.id">
      </app-dependencies-d3>

      <app-classes-per-file *ngSwitchCase="'classes-per-file'" [repoId]="repo()!.id">
      </app-classes-per-file>

      <function-coupling *ngSwitchCase="'function-coupling'" [repoId]="repo()!.id">
      </function-coupling>

      <app-class-coupling *ngSwitchCase="'class-coupling'" [repoId]="repo()!.id">
      </app-class-coupling> -->

    </ng-container>
  </div>

</div>

<!-- Details Modal -->
<app-details-component
  [isOpen]="showDetailsModal()"
  [repo]="repo()"
  [scan]="scan()"
  [loading]="loading()"
  [error]="error()"
  (runScan)="runScan()"
  (downloadScanJson)="downloadScanJson()"
  (close)="showDetailsModal.set(false)">
</app-details-component>
