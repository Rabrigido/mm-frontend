<app-graph-wrapper
  title="Module → Class Coupling"
  [legendItems]="legendItems"
  [loading]="loading()"
  [error]="error()"
  [separation]="separation()"
  [showTreeModal]="showTreeModal()"
  [allNodes]="allNodes"
  [hiddenNodes]="hiddenNodes()"
  (separationChange)="separation.set($event); updateSeparation($event)"
  (expandAll)="expandAll()"
  (collapseAll)="collapseAll()"
  (downloadSVG)="downloadSVG()"
  (downloadPNG)="downloadPNG()"
  (openTreeModal)="showTreeModal.set(true)"
  (openDetailsModal)="openDetailsModal.emit()"
  (runScan)="runScan.emit()"
  (treeNodeSelected)="onNodeSelected($event)"
  (closeTreeModal)="showTreeModal.set(false)">
  <div #graphContainer [class]="graphs.container.inner"></div>
</app-graph-wrapper>
