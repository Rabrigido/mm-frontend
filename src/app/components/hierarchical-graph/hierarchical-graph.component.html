<div [class]="graphs.container.main">

  <!-- Graph Container -->
  <div #graphContainer [class]="graphs.container.inner"></div>

  <!-- Legend / Instructions -->
  <div [class]="graphs.legend.container">
    <h3 [class]="graphs.legend.title">Interactive Dependency Graph</h3>

    <div [class]="graphs.legend.itemsContainer">
      <div [class]="graphs.legend.item">
        <span [class]="graphs.node.folder"></span>
        <span [class]="graphs.legend.label">Folder</span>
      </div>
      <div [class]="graphs.legend.item">
        <span [class]="graphs.node.file"></span>
        <span [class]="graphs.legend.label">File</span>
      </div>
      <div [class]="graphs.legend.item">
        <span [class]="graphs.node.class"></span>
        <span [class]="graphs.legend.label">Class</span>
      </div>
      <div [class]="graphs.legend.item">
        <span [class]="graphs.node.function"></span>
        <span [class]="graphs.legend.label">Function</span>
      </div>


    </div>

    <div [class]="graphs.legend.divider">
      <p>👉 <strong>Click a node</strong> to drill down (Expand).</p>
      <p>👉 <strong>Click a dashed circle</strong> to go up (Collapse).</p>
      <p>🖐 <strong>Drag</strong> to rearrange nodes.</p>
      <p>🔍 <strong>Scroll</strong> to zoom in/out.</p>


    </div>

    <div [class]="graphs.legend.controlGroup">
      <div [class]="graphs.slider.label">
        <span [class]="graphs.slider.labelText">Node spacing</span>
        <span [class]="graphs.slider.labelValue">{{ separation() }}×</span>
      </div>
      <input type="range" min="0.5" max="4" step="0.1" [value]="separation()" (input)="onSeparationChange($event)"
        [class]="graphs.slider.input">
      <div [class]="graphs.slider.range">
        <span>Compact</span>
        <span>Spread</span>
      </div>

      <button (click)="showTreeModal.set(true)" title="Browse entities" [class]="graphs.actions.button">
        <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
          stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 6h16M4 12h16M4 18h16" />
        </svg>
        Tree
      </button>
    </div>




    <div [class]="graphs.buttonGroup.container">
      <button (click)="expandAll()"
        [class]="graphs.buttonGroup.button + ' ' + graphs.buttonGroup.expand">
        Expand All
      </button>
      <button (click)="collapseAll()"
        [class]="graphs.buttonGroup.button + ' ' + graphs.buttonGroup.collapse">
        Collapse All
      </button>
    </div> 
  </div>

  <!-- Download Actions -->
  <div [class]="graphs.actions.container">
    <button (click)="downloadSVG()" title="Download SVG" [class]="graphs.actions.button">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      SVG
    </button>
    <button (click)="downloadPNG()" title="Download PNG" [class]="graphs.actions.button">
      <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"
        stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round"
          d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
      </svg>
      PNG
    </button>

  </div>

</div>
<div *ngIf="loading()" [class]="graphs.state.loading.overlay">
  <div [class]="graphs.state.loading.spinner"></div>
  <span [class]="graphs.state.loading.text">Calculating Layout...</span>
</div>

<!-- Error State -->
<div *ngIf="error()" [class]="graphs.state.error.overlay">
  {{ error() }}
</div>

<!-- Graph Entities Tree Modal -->
<app-graph-tree-modal
  [isOpen]="showTreeModal()"
  [nodes]="allNodes"
  [hiddenNodeIds]="hiddenNodes()"
  (nodeSelected)="onNodeSelected($event)"
  (close)="showTreeModal.set(false)">
</app-graph-tree-modal>
